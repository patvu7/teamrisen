<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Risen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e6d3;
    --bg-card: #e8dcc8;
    --bg-card-hover: #e0d4be;
    --gold: #c4a35a;
    --gold-light: #d4b96a;
    --cream: #3a2f22;
    --white: #2c2418;
    --text: #4a3f33;
    --text-muted: #8a7e6e;
    --border: rgba(140, 120, 80, 0.2);
    --border-hover: rgba(140, 120, 80, 0.4);
    --radius: 16px;
    --radius-lg: 24px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Hero ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 60px 24px;
  }



  .hero-logo {
    width: min(500px, 85vw);
    animation: logoReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.12));
    transition: transform 0.4s ease;
  }

  .hero-logo:hover {
    transform: scale(1.03);
  }

  @keyframes logoReveal {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .hero-tagline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: #8a6e3a;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 48px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .hero-sub {
    font-weight: 300;
    font-size: clamp(0.9rem, 1.8vw, 1.05rem);
    color: var(--text-muted);
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.85s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .scroll-cue {
    position: absolute;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .scroll-cue span {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .scroll-cue .arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Sections ── */
  section {
    padding: 100px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a6e3a;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .section-desc {
    font-weight: 300;
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .visible .section-label,
  .visible .section-title,
  .visible .section-desc {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Sport Cards Grid ── */
  .sport-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 24px;
  }

  .sport-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.3s ease,
                background 0.3s ease;
  }

  .sport-card:hover {
    border-color: var(--border-hover);
    background: var(--bg-card-hover);
    transform: translateY(-4px) !important;
  }

  .visible .sport-card:nth-child(1) { transition-delay: 0.15s; opacity: 1; transform: translateY(0); }
  .visible .sport-card:nth-child(2) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }

  .sport-card-header {
    padding: 28px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sport-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--white);
  }

  .sport-card-badge {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8a6e3a;
    background: rgba(196, 163, 90, 0.1);
    border: 1px solid rgba(196, 163, 90, 0.2);
    padding: 5px 14px;
    border-radius: 100px;
  }

  .sport-card-variants {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 24px 28px 28px;
  }

  .variant {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1;
  }

  .variant img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .variant:hover img {
    transform: scale(1.06);
  }



  /* ── Cap Showcase ── */
  .cap-section {
    padding-top: 40px;
  }

  .cap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .cap-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.3s ease,
                background 0.3s ease;
  }

  .cap-card:hover {
    border-color: var(--border-hover);
    background: var(--bg-card-hover);
    transform: translateY(-4px) !important;
  }

  .visible .cap-card:nth-child(1) { transition-delay: 0.1s; opacity: 1; transform: translateY(0); }
  .visible .cap-card:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
  .visible .cap-card:nth-child(3) { transition-delay: 0.3s; opacity: 1; transform: translateY(0); }
  .visible .cap-card:nth-child(4) { transition-delay: 0.4s; opacity: 1; transform: translateY(0); }

  .cap-image-wrap {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #ddd0ba, #d4c6ae);
  }

  .cap-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .cap-card:hover .cap-image-wrap img {
    transform: scale(1.06);
  }

  .cap-info {
    padding: 20px 24px;
  }

  .cap-style-name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--white);
  }

  .cap-color {
    font-weight: 300;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Divider ── */
  .divider {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .divider-line {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border-hover), transparent);
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 60px 24px 80px;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  footer .brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #8a6e3a;
    margin-bottom: 8px;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    cursor: pointer;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox img {
    max-width: 85vw;
    max-height: 85vh;
    border-radius: var(--radius);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    transform: scale(0.9);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .lightbox.active img {
    transform: scale(1);
  }

  .lightbox-close {
    position: absolute;
    top: 28px;
    right: 28px;
    width: 44px;
    height: 44px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    color: var(--cream);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .lightbox-close:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sport-grid { grid-template-columns: 1fr; }
    .cap-grid { grid-template-columns: 1fr 1fr; }
    section { padding: 72px 20px; }
  }

  @media (max-width: 480px) {
    .cap-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  // Intersection Observer for scroll reveals
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('section').forEach(s => observer.observe(s));

  // Lightbox
  function openLightbox(el) {
    const img = el.querySelector('img') || el.querySelector('.cap-image-wrap img');
    if (!img) return;
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = img.src;
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
